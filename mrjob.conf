runners:
  emr:
    region: us-east-1
    iam_instance_profile: EMR_EC2_DefaultRole
    iam_service_role: EMR_DefaultRole
    image_version: 7.12.0
    python_bin: /usr/bin/python3.12 -u

    jobconf:
      mapreduce.map.memory.mb: 2048
      mapreduce.map.java.opts: -Xmx1536m
      mapreduce.reduce.memory.mb: 4096
      mapreduce.reduce.java.opts: -Xmx3072m
      mapreduce.job.reduce.slowstart.completedmaps: 0.9
      # cc-lint is CPU-bound (httplint on WAT response metadata), so
      # speculative execution doubles billable CPU on slow-but-correct
      # mappers without saving wall time. Disable for the full run; the
      # test config also has it off.
      mapreduce.map.speculative: "false"
      mapreduce.reduce.speculative: "false"
      # Bound the per-task heartbeat timeout above our 15-min --warc-timeout
      # plus generous setup overhead, but below the "wedged forever"
      # threshold so a stuck mapper gets killed and re-attempted.
      mapreduce.task.timeout: 1800000
      fs.s3a.requester-pays.enabled: "true"

    upload_dirs:
      - cc_lint

    # CPU-bound workload: prefer compute-optimised c5 family. Memory caps
    # are tiny (2 GB per mapper) so the m5/r5 RAM ratios are wasted spend.
    # EMR picks the cheapest available instance from the fleet, so listing
    # c5n / c5d as fallbacks keeps capacity available if c5 is exhausted.
    instance_fleets:
      - InstanceFleetType: MASTER
        TargetOnDemandCapacity: 1
        InstanceTypeConfigs:
          - InstanceType: m5.xlarge
      - InstanceFleetType: CORE
        TargetOnDemandCapacity: 30
        InstanceTypeConfigs:
          - InstanceType: c5.xlarge
          - InstanceType: c5d.xlarge
          - InstanceType: c5n.xlarge
