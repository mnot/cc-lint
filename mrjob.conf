runners:
  emr:
    # Setup the environment on EMR nodes
    bootstrap:
      # Update pip
      - sudo pip3 install -U pip
      # Install project dependencies
      - sudo pip3 install httplint>=2026.1.10 warcio boto3 requests click
    
    # Instance type configuration (optional, helps control costs/performance)
    instance_type: m5.xlarge
    num_core_instances: 2
    
    # Region where Common Crawl data lives (us-east-1) to minimize latency/costs
    region: us-east-1
